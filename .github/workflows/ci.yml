name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Lint frontend
        run: npm run lint || echo "Lint warnings — non-blocking until backlog is clean"

      - name: Build frontend
        run: npm run build

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Server syntax check
        working-directory: server
        run: |
          for f in $(find . -name "*.js" -not -path "./node_modules/*"); do
            node --check "$f" || exit 1
          done
